media:
  input: public/img-posts
  output: /img-posts
  categories: [ "image" ]
content:
  - name: posts
    label: Posts
    type: collection
    path: posts
    view:
      fields: [ coverImage, title, date ]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: string, required: true }
      - { name: cover, label: Cover image, type: image }
      - { name: date, label: Date, type: date, options: { time: true, format: "yyyy-MM-dd'" }, required: true }
      - name: attachment
        label: Attachment
        type: file
      - name: tag
        label: Tag
        type: select
        options:
          multiple: true
          values: [ Запросы, СКД, Формы ]
      - name: ogImage
        label: Image (social sharing)
        type: object
        fields:
          - { name: url, label: URL, type: image }
      - { name: body, label: Body, type: rich-text, required: true }
 